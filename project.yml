name: Comb

options:
  bundleIdPrefix: dev.jedbridges
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULE_VERIFIER: YES

packages:
  CombCore:
    path: CombCore
  CombNet:
    path: CombNet
  CombStore:
    path: CombStore

targets:
  Comb:
    type: application
    platform: iOS
    sources:
      - path: Comb
      - path: communities/index.json
        buildPhase: resources
    dependencies:
      - package: CombCore
      - package: CombNet
      - package: CombStore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jedbridges.comb
        PRODUCT_NAME: Comb
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1"
        # The name under the icon. The App Store Connect record is "Comb
        # Communities" only because "Comb" was taken as a listing name; the
        # device always shows Comb.
        INFOPLIST_KEY_CFBundleDisplayName: Comb
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        # secp256k1 and TLS are both export-compliance exempt. Declaring it here
        # skips the compliance prompt on every TestFlight upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSCameraUsageDescription: "Comb uses the camera to scan a pairing code from another device."
    info:
      path: Comb/Resources/Info.plist
      properties:
        # Dark only, and set here rather than with preferredColorScheme so it
        # also covers the surfaces SwiftUI does not own: the share sheet, the
        # photo picker, the keyboard, every system alert. A SwiftUI-only
        # override leaves those resolving against the device setting, which is
        # what made elements flip appearance mid-transition.
        #
        # The brand is a dark gradient with one bright accent, and the light
        # variant of it was never finished. Shipping a half-built appearance is
        # worse than shipping one.
        UIUserInterfaceStyle: Dark
        # Background refresh wakes the app to check for mentions while it is
        # closed, since hosted Buzz's push gateway will not enrol a third-party
        # client. The identifier must match BackgroundRefresh.taskIdentifier.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - dev.jedbridges.comb.refresh
        CFBundleURLTypes:
          - CFBundleURLName: dev.jedbridges.comb.join
            CFBundleURLSchemes:
              - comb
              - buzz

  CombTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CombTests
    dependencies:
      - target: Comb

schemes:
  Comb:
    build:
      targets:
        Comb: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CombTests
    archive:
      config: Release
