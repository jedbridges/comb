name: Comb

options:
  bundleIdPrefix: dev.jedbridges
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULE_VERIFIER: YES

packages:
  CombCore:
    path: CombCore

targets:
  Comb:
    type: application
    platform: iOS
    sources:
      - path: Comb
    dependencies:
      - package: CombCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jedbridges.comb
        PRODUCT_NAME: Comb
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        # secp256k1 and TLS are both export-compliance exempt. Declaring it here
        # skips the compliance prompt on every TestFlight upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSCameraUsageDescription: "Comb uses the camera to scan a pairing code from another device."
    info:
      path: Comb/Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: dev.jedbridges.comb.join
            CFBundleURLSchemes:
              - comb
              - buzz

  CombTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CombTests
    dependencies:
      - target: Comb

schemes:
  Comb:
    build:
      targets:
        Comb: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CombTests
    archive:
      config: Release
