name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The fast gate. Everything protocol-level is verifiable with no simulator,
  # which is most of the code and nearly all of the subtle code.
  packages:
    name: Package tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package: [CombCore, CombStore]
    steps:
      - uses: actions/checkout@v4

      # Runner images change their bundled Xcode versions without notice, so
      # pick the newest one present rather than pinning a path that will rot.
      - name: Select newest Xcode
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ${{ matrix.package }}/.build
          key: spm-${{ matrix.package }}-${{ hashFiles(format('{0}/Package.resolved', matrix.package)) }}
          restore-keys: spm-${{ matrix.package }}-

      - name: Test
        run: swift test --package-path ${{ matrix.package }}

  app:
    name: App build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      # A generic simulator destination avoids depending on which device names
      # the runner image happens to ship. The app target's own tests are thin by
      # design and run locally with `make test-app`; the package suites above are
      # what actually gate correctness.
      #
      # swift-secp256k1 ships a build plugin that Xcode will not run without
      # interactive trust, hence the skip flags.
      - name: Build
        run: |
          xcodebuild build \
            -project Comb.xcodeproj \
            -scheme Comb \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
